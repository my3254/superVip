<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; frame-src https: http:; form-action 'none'; base-uri 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="SuperVip" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>SuperVip Mobile</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-browser">
      <header class="browser-topbar">
        <div class="brand">
          <div class="brand-mark">SV</div>
          <div>
            <div class="brand-name">SuperVip</div>
            <div id="currentPlatformName" class="brand-subtitle">爱奇艺</div>
          </div>
        </div>
        <button id="externalButton" class="icon-action" type="button" aria-label="在新页面打开当前官网">↗</button>
      </header>

      <section class="web-stage" aria-label="官网页面">
        <iframe
          id="siteFrame"
          class="site-frame"
          title="视频官网"
          referrerpolicy="no-referrer"
        ></iframe>
        <div id="frameFallback" class="frame-fallback" hidden>
          <div class="fallback-title">当前官网不允许嵌入显示</div>
          <div class="fallback-text">点下面按钮在 Safari 新页面打开，找到视频后复制地址，再回到这里解析。</div>
          <button id="fallbackOpenButton" class="primary-button" type="button">打开当前官网</button>
        </div>
      </section>

      <div class="bottom-controls">
        <div id="platformList" class="platform-dock" aria-label="切换官网"></div>
      </div>

      <section id="parseSheet" class="parse-sheet" aria-labelledby="parseTitle" hidden>
        <div class="sheet-handle"></div>
        <div class="section-title-row">
          <h1 id="parseTitle">复制链接后解析</h1>
          <button id="closeParseButton" class="plain-button" type="button">关闭</button>
        </div>

        <form id="parseForm" class="parse-form">
          <label class="field-label" for="urlInput">视频页地址</label>
          <div class="url-row">
            <input
              id="urlInput"
              class="url-input"
              type="url"
              inputmode="url"
              autocomplete="url"
              autocapitalize="none"
              spellcheck="false"
              placeholder="https://..."
            />
            <button id="pasteButton" class="small-button" type="button">粘贴</button>
          </div>

          <label class="field-label" for="interfaceSelect">解析线路</label>
          <select id="interfaceSelect" class="select"></select>

          <div class="action-grid">
            <button id="openOfficialButton" class="secondary-button" type="button">打开当前官网</button>
            <button id="parseButton" class="primary-button" type="submit" disabled>开始解析</button>
          </div>
        </form>

        <div id="statusBar" class="status-bar">打开官网，复制视频页地址后粘贴解析。</div>

        <div id="resultPanel" class="result-panel" hidden>
          <div>
            <div class="result-label">解析链接</div>
            <div id="resultUrl" class="result-url"></div>
          </div>
          <button id="copyButton" class="small-button" type="button">复制</button>
        </div>

        <div class="section-title-row history-title-row">
          <h2>最近解析</h2>
          <button id="clearHistoryButton" class="plain-button" type="button">清空</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <script src="./catalog.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
